<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let messages = 1;
        setInterval(function () {
            const titleElement = document.querySelector('title');
            titleElement.innerHTML = `(${messages})New Messages`;
            messages++;
        }, 1000);
    </script>
</body>

</html>
