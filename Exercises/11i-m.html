<body>
    <script>
        function minMax(nums) {
            let min = nums[0];
            let max = nums[0];
            if (nums.length === 0) {
                return {
                    min: null,
                    max: null
                };
            }
            
            for (let i = 1; i < nums.length; i++) {
                min = Math.min(nums[i], min);
                max = Math.max(nums[i], max);
            }

            const obj = {
                min,
                max
            }

            return obj;
        }

        console.log(minMax([0, 2, 3, 4, -5, 7, 8, 9, 10]));
    </script>
</body>
2
