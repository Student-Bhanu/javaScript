<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button onclick="
        change();
        ">Add to Cart
    </button>
    <p></p>

    <script>
        let countTimeOut = 0;
        let prevTimeOutId = null;
        let CurrTimeOutId = null;
        function change() {
            const para = document.querySelector('p');
            para.innerHTML = 'Added to cart';
            CurrTimeOutId = setTimeout(function () {
                if (countTimeOut + 1 >= 2) {
                    para.innerHTML = '';
                    clearTimeout(prevTimeOutId);
                }
                para.innerHTML = '';
                prevTimeOutId = CurrTimeOutId;
                countTimeOut++;
            }, 2000);
        }
    </script>
</body>

</html>
