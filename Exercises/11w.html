<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Array</title>
</head>

<body>
    <script>
        function findIndex(nums, target) {
            for (let i = 0; i < nums.length; i++) {
                if (nums[i] === target) {
                    return i;
                }
            }
            return -1;
        }

        // console.log(findIndex([1, 2, 3, 4], 4));

        function uniqueArray(nums) {
            const uniqueArray = [];
            for (let i = 0; i < nums.length; i++) {
                if (findIndex(uniqueArray, nums[i]) === -1) {
                    uniqueArray.push(nums[i]);
                }
            }
            return uniqueArray;
        }

        console.log(uniqueArray([1, 1, 2, 2, 3, 4, 5, 6, 7, 7, 9]));
    </script>
</body>

</html>
