<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project</title>
</head>

<body>
    <p>YouTube Subscribe Button</p>
    <button class="js-subscribe" onClick="
    subscribe();
    "> Subscribe </button>
    <br>
    <p>Amazon Shipping Calculator</p>
    <p>Order under $40 = +$10 shipping</p>
    <p>Orders over $40 = FREE shipping.</p>
    <input class="js-amount" placeholder="Cost of order" type="text" onkeyDown="
    handleEnterkeyDown(event);
    ">
    <button onClick="
    calculateCost();
    ">Calculate</button>
    <p class="js-amount-show"></p>


    <script>
        // this represents the whole browser 
        console.log(window);
        window.console.log('Window');
        window.alert('Window');



        function handleEnterkeyDown(event) {
            console.log(event);
            if (event.key === 'Enter') {
                calculateCost();
            }
        }

        function calculateCost() {
            const costElement = document.querySelector('.js-amount');
            let cost = Number(costElement.value).toFixed(2);
            if (cost < 40) {
                cost += 10;
            }
            const messageElement = document.querySelector('.js-amount-show');
            messageElement.innerHTML = `$${cost}`;
        }

        function subscribe() {
            const subsButton = document.querySelector('.js-subscribe');
            // innerText for only text not any spaces 
            if (subsButton.innerText === 'Subscribe') {
                subsButton.innerText = 'Subscribed';
            }
            else {
                subsButton.innerText = 'Subscribe';
            }
        }
    </script>
</body>

</html>
