        // filter, it go through each value of array and return a truth and false value, if the return is true then it will create a new array and store that value in that array and if the return is false then it will not add that element in new array
        const newArr = [-3, 4, 10, -1, 0].filter((value, index) => {

        });

        // map, it will go through the each value of array and return the value which will store in the new array
