<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock-paper-Scissor</title>
    <link rel="stylesheet" href="styles/12-rock-paper-scissor.css">
</head>

<body>
    <p class="heading">rock paper Scissor</p>

    <button class="gesture-container js-rock-event">
        <img class="gesture" src="images/rock-emoji.png" alt=""></button>

    <button class="gesture-container js-paper-event">
        <img class="gesture" src="images/paper-emoji.png" alt="">
    </button>

    <button class="gesture-container js-scissors-event">
        <img class="gesture" src="images/scissors-emoji.png" alt="">
    </button>

    <p class="js-greets greets-message"></p>
    <p class="js-message"></p>
    <p class="js-scores results">
        wins: 0, lose : 0, ties: 0
    </p>

    <button class="reset-score-button js-reset-scores-event">Reset Scores</button>

    <button class="auto-play-button js-auto-play-event">Auto Play</button>
    <script src="scripts/12-rock-paper-scissor.js"></script>
</body>

</html>
